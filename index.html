<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>My Projects Page</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<!-- Google Font -->
	<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

	<style>
		body {
			font-family: 'Poppins', sans-serif;
			margin: 0;
			background: #f5f7fa;
			color: #333;
		}

		header {
			background: #4f46e5;
			color: white;
			padding: 20px;
			text-align: center;
		}

		.container {
			padding:40px
			text-align: center;
		}

		button {
			background: #4f46e5;
			color: white;
			border: none;
			padding: 10px 20px;
			border-radius: 8px;
			cursor: pointer;
			transition: 0.3s;
		}

		button:hover {
			background: #3730a3;
			transform: scale(1.05);
		}

		.card {
			background: white;
			padding: 20px;
			margin: 20px auto;
			max-width: 400px;
			border-radius: 12px;
			box-shadow: 0 4px 10 px rgba(0,0,0,0.1);
		}
	</style>
</head>

<body>

<header>

<div class="container">
	<div class="card">
		<h2> Hey everybody! </h2>
		<p> This is my first project showcase, styled and hardcoded webpage.</p>
		<button onclick="changeText()">Click me</button>
		<p id="text"></p>
	</div>
</div>

<script>
	function changeText(){
		document/.getElementById("text").innerText = "You clicked the button!(It's head hurts now ;P)";
	}
</script>

</body>
</html>
